<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Event Registration</h2>
    <form action="http://localhost:5001/api/registrations" method="POST">
        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" name="fullName" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required>

        <label for="rollNumber">Roll Number / ID:</label>
        <input type="text" id="rollNumber" name="rollNumber" required>

        <label for="department">Department:</label>
        <select id="department" name="department" required>
            <option value="" disabled selected>Select your department</option>
            <option value="IT">Information Technology</option>
            <option value="CSE">Computer Science</option>
            <option value="ECE">Electronics & Communication</option>
            <option value="EE">Electrical Engineering</option>
            <option value="ME">Mechanical Engineering</option>
            <option value="CE">Civil Engineering</option>
            <option value="Other">Other</option>
        </select>

        <label for="year">Year of Study:</label>
        <select id="year" name="year" required>
            <option value="" disabled selected>Select your year</option>
            <option value="1">1st Year</option>
            <option value="2">2nd Year</option>
            <option value="3">3rd Year</option>
            <option value="4">4th Year</option>
            <option value="Other">Other</option>
        </select>

        <label for="question">Why do you want to attend this event?</label>
        <textarea id="question" name="question" rows="3"></textarea>

        <label>
            <input type="checkbox" id="terms" name="terms" required>
            I agree to the terms and conditions
        </label>

        <button type="submit">Submit Registration</button>
    </form>
</body>
</html>
